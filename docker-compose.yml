services:
  mongo:
    image: mongo:7
    container_name: mongo-notes
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: notes_db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      timeout: 20s
      retries: 10

  maildev:
    image: maildev/maildev
    container_name: maildev-notes
    restart: always
    ports:
      - '1080:1080'
      - '1025:1025'
    environment:
      - MAILDEV_INCOMING_USER=admin
      - MAILDEV_INCOMING_PASS=admin

  nest-app:
    build:
      context: .
      target: production
    container_name: notes-backend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/notes_db
      SMTP_HOST: maildev
      SMTP_PORT: 1025
      SMTP_USER: admin
      SMTP_PASS: admin
    networks:
      - default
      - infra

networks:
  default:
  infra:
    external: true

volumes:
  mongo_data:
