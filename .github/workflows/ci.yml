name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build and start container
        run: docker compose -f docker-compose.yml up --build -d
